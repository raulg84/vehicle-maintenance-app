<div class="login">
  <div class="login__card">
    <div class="login__header">
      <h1 class="login__title">Acceso</h1>
      <p class="login__subtitle">
        Inicia sesión para gestionar tus vehículos y mantenimientos.
      </p>
    </div>

    <form class="login__form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="login__group">
        <label class="login__label" for="email">Email</label>
        <input
          id="email"
          class="login__input"
          type="email"
          formControlName="email"
          placeholder="admin@tfm.local"
        />

        @if (emailControl?.invalid && emailControl?.touched) {
          <p class="login__field-error">Introduce un email válido.</p>
        }
      </div>

      <div class="login__group">
        <label class="login__label" for="password">Contraseña</label>
        <input
          id="password"
          class="login__input"
          type="password"
          formControlName="password"
          placeholder="Contraseña"
        />

        @if (passwordControl?.invalid && passwordControl?.touched) {
          <p class="login__field-error">La contraseña es obligatoria.</p>
        }
      </div>

      @if (error) {
        <p class="login__error">{{ error }}</p>
      }

      <button class="login__submit" type="submit" [disabled]="loading">
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>
  </div>
</div>
