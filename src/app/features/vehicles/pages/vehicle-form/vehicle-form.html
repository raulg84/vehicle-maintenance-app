<div class="vehicle-form">
    <div class="vehicle-form__header">
        <div class="vehicle-form__header-main">
            <a class="vehicle-form__back" routerLink="/vehicles">
                ← Volver a vehículos
            </a>

            <div class="vehicle-form__header-text">
                <h2 class="vehicle-form__title">
                    Añadir vehículo
                </h2>

                <p class="vehicle-form__description">
                    Introduce los datos del vehículo.
                </p>
            </div>
        </div>
    </div>

    <form class="vehicle-form__form" [formGroup]="vehicleForm" (ngSubmit)="onSubmit()">
        <div class="vehicle-form__group">
            <label class="vehicle-form__label">Alias</label>
            <input class="vehicle-form__input" type="text" formControlName="alias" placeholder="Ej: Mi BMW" />
        </div>

        <div class="vehicle-form__group">
            <label class="vehicle-form__label">Marca</label>
            <input class="vehicle-form__input" type="text" formControlName="make" placeholder="Ej: BMW" />
        </div>

        <div class="vehicle-form__group">
            <label class="vehicle-form__label">Modelo</label>
            <input class="vehicle-form__input" type="text" formControlName="model" placeholder="Ej: 320i" />
        </div>

        <div class="vehicle-form__group">
            <label class="vehicle-form__label">Año</label>
            <input class="vehicle-form__input" type="number" formControlName="year" placeholder="Ej: 2014" />
        </div>

        <div class="vehicle-form__group">
            <label class="vehicle-form__label">Kilometraje actual</label>
            <input class="vehicle-form__input" type="number" formControlName="current_mileage"
                placeholder="Ej: 137000" />
        </div>

        @if (error) {
        <p class="vehicle-form__error">{{ error }}</p>
        }

        <div class="vehicle-form__actions">
            <a class="vehicle-form__cancel" routerLink="/vehicles">
                Cancelar
            </a>

            <button class="vehicle-form__submit" type="submit" [disabled]="loading">
                {{ loading ? 'Guardando...' : 'Guardar vehículo' }}
            </button>
        </div>
    </form>
</div>
