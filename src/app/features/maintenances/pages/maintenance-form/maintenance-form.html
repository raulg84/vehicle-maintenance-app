<div class="maintenance-form">
  <div class="maintenance-form__header">
    <h2 class="maintenance-form__title">Registrar mantenimiento</h2>
    <a class="maintenance-form__back" routerLink="/vehicles">Volver al listado</a>
  </div>

  <form class="maintenance-form__form" [formGroup]="maintenanceForm" (ngSubmit)="onSubmit()">
    <div class="maintenance-form__group">
      <label class="maintenance-form__label" for="vehicle_id">ID vehículo</label>
      <input
        id="vehicle_id"
        class="maintenance-form__input"
        type="number"
        formControlName="vehicle_id"
      />
    </div>

    <div class="maintenance-form__group">
      <label class="maintenance-form__label" for="maintenance_type">Tipo de mantenimiento</label>
      <input
        id="maintenance_type"
        class="maintenance-form__input"
        type="text"
        formControlName="maintenance_type"
        placeholder="Ej: Cambio de aceite"
      />
    </div>

    <div class="maintenance-form__group">
      <label class="maintenance-form__label" for="performed_at">Fecha</label>
      <input
        id="performed_at"
        class="maintenance-form__input"
        type="date"
        formControlName="performed_at"
      />
    </div>

    <div class="maintenance-form__group">
      <label class="maintenance-form__label" for="mileage_at_service">Kilometraje</label>
      <input
        id="mileage_at_service"
        class="maintenance-form__input"
        type="number"
        formControlName="mileage_at_service"
      />
    </div>

    <div class="maintenance-form__group">
      <label class="maintenance-form__label" for="cost">Coste</label>
      <input
        id="cost"
        class="maintenance-form__input"
        type="number"
        step="0.01"
        formControlName="cost"
      />
    </div>

    <div class="maintenance-form__group">
      <label class="maintenance-form__label" for="notes">Notas</label>
      <textarea
        id="notes"
        class="maintenance-form__textarea"
        formControlName="notes"
        rows="4"
      ></textarea>
    </div>

    @if (error) {
      <p class="maintenance-form__error">{{ error }}</p>
    }

    <div class="maintenance-form__actions">
      <button class="maintenance-form__submit" type="submit" [disabled]="loading">
        {{ loading ? 'Guardando...' : 'Guardar mantenimiento' }}
      </button>
    </div>
  </form>
</div>
